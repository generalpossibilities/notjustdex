name: notjustdex

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notjustdex
      POSTGRES_PASSWORD: notjustdex
      POSTGRES_DB: notjustdex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  auth:
    build: ./services/auth
    ports:
      - "8081:8081"
    environment:
      LISTEN_ADDR: ":8081"
      JWT_SECRET: "${JWT_SECRET:-dev-secret}"

  users:
    build: ./services/users
    ports:
      - "8082:8082"
    environment:
      LISTEN_ADDR: ":8082"

  feed:
    build: ./services/feed
    ports:
      - "8083:8083"
    environment:
      LISTEN_ADDR: ":8083"

  chat:
    build: ./services/chat
    ports:
      - "8085:8085"
    environment:
      LISTEN_ADDR: ":8085"

  search:
    build: ./services/search
    ports:
      - "8086:8086"
    environment:
      LISTEN_ADDR: ":8086"

  notifications:
    build: ./services/notifications
    ports:
      - "8087:8087"
    environment:
      LISTEN_ADDR: ":8087"

  media:
    build: ./services/media
    ports:
      - "8088:8088"
    environment:
      LISTEN_ADDR: ":8088"

  analytics:
    build: ./services/analytics
    ports:
      - "8089:8089"
    environment:
      LISTEN_ADDR: ":8089"

  moderation:
    build: ./services/moderation
    ports:
      - "8090:8090"
    environment:
      LISTEN_ADDR: ":8090"

  dao:
    build: ./services/dao
    ports:
      - "8091:8091"
    environment:
      LISTEN_ADDR: ":8091"

  creator_economy:
    build: ./services/creator_economy
    ports:
      - "8092:8092"
    environment:
      LISTEN_ADDR: ":8092"

volumes:
  pgdata:
