name: notjustdex

packages:
  - apps/**
  - packages/**
  - services/chat_relay/**

command:
  bootstrap:
    runPubGetInParallel: true
    usePubspecOverrides: true

scripts:
  analyze:
    run: melos exec -c 1 -- dart analyze .
    description: Run dart analyzer across all packages

  format:
    run: melos exec -- dart format .
    description: Format dart code across all packages

  test:
    run: melos exec -- "if [ -d test ]; then flutter test; else echo 'No test directory'; fi"
    description: Run dart tests across all packages

  gen:
    run: melos run gen:proto && melos run gen:code
    description: Regenerate all code

  gen:proto:
    run: melos exec -c 1 --scope notjustdex_shared_proto -- dart run build_runner build --delete-conflicting-outputs
    description: Generate protobuf dart code

  gen:code:
    run: melos exec -c 1 --scope notjustdex_identity_kernel -- dart run build_runner build --delete-conflicting-outputs
    description: Run dart code generation (freezed, json_serializable)


