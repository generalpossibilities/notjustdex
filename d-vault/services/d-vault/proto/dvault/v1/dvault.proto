syntax = "proto3";

package dvault.v1;

option go_package = "github.com/notjustdex/d-vault/proto/dvault/v1;dvaultv1";

service DVaultService {
  rpc GetVault(GetVaultRequest) returns (GetVaultResponse);
  rpc UpdateVault(UpdateVaultRequest) returns (UpdateVaultResponse);
}

message GetVaultRequest {
  string username = 1;
  string contract_address = 2;
}

message GetVaultResponse {
  bytes encrypted_data = 1;
  uint32 version = 2;
  uint64 updated_at = 3;
}

message UpdateVaultRequest {
  string username = 1;
  string contract_address = 2;
  bytes encrypted_data = 3;
}

message UpdateVaultResponse {
  string tx_id = 1;
}
