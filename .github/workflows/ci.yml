name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DART_VERSION: "3.7"

jobs:
  dart-checks:
    name: Dart analysis & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.x
      - uses: bluefireteam/melos-action@v3
      - run: melos run gen
      - name: Analyze each package individually
        run: |
          failed=false
          for pkg in packages/*/; do
            if [ -f "${pkg}pubspec.yaml" ]; then
              name=$(basename $pkg)
              echo "--- $name ---"
              output=$(cd "$pkg" && dart analyze . 2>&1) || {
                failed=true
                errors=$(echo "$output" | grep -E "^  (error|warning)" | head -3 | tr '\n' ';')
                echo "::error title=$name::$errors"
                echo "Full output:"
                echo "$output"
              }
            fi
          done
          $failed && exit 1 || echo "All packages passed"
      - run: melos run test

  build:
    name: Build
    if: github.ref == 'refs/heads/main'
    needs: [dart-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.x
      - uses: bluefireteam/melos-action@v3
      - run: melos run gen
      - run: flutter build web --release
        working-directory: apps/web
