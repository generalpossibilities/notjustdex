  dexchats_design_system:
    path: ../../packages/design_system
  dexchats_in_app_browser:
    path: ../../packages/in_app_browser
  dexchats_mini_app_runtime:
    path: ../../packages/mini_app_runtime

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.8
  build_runner: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  patrol: ^3.12.0

flutter:
  uses-material-design: true
