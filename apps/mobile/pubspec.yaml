name: dexchats_mobile
description: DexChats mobile app
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  go_router: ^14.6.0
  flutter_hooks: ^0.20.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dexchats_identity_kernel:
