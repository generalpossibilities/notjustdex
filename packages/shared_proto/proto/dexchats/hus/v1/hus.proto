syntax = "proto3";

package dexchats.hus.v1;

option go_package = "github.com/dexchats/hus/v1;husv1";

service HUSService {
  rpc GetVerificationStatus(GetVerificationStatusRequest) returns (GetVerificationStatusResponse);
  rpc InitiateVerification(InitiateVerificationRequest) returns (InitiateVerificationResponse);
  rpc GetScore(GetScoreRequest) returns (GetScoreResponse);
}

message GetVerificationStatusRequest {
  string identity_id = 1;
}

message GetVerificationStatusResponse {
  bool is_verified = 1;
  string level = 2;
  int64 verified_at = 3;
}

message InitiateVerificationRequest {
  string identity_id = 1;
  string method = 2;
}

message InitiateVerificationResponse {
  string verification_id = 1;
  string challenge = 2;
  int64 expires_at = 3;
}

message GetScoreRequest {
  string identity_id = 1;
}

message GetScoreResponse {
  double score = 1;
  int32 total_verifications = 2;
}
