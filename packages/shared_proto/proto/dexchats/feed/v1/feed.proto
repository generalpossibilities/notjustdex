syntax = "proto3";

package dexchats.feed.v1;

option go_package = "github.com/dexchats/feed/v1;feedv1";

import "dexchats/common/v1/common.proto";

service FeedService {
  rpc GetFeed(GetFeedRequest) returns (GetFeedResponse);
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
  rpc LikePost(LikePostRequest) returns (LikePostResponse);
  rpc GetTrending(GetTrendingRequest) returns (GetTrendingResponse);
}

enum FeedType {
  FEED_TYPE_UNSPECIFIED = 0;
  FEED_TYPE_FOLLOWING = 1;
  FEED_TYPE_RECOMMENDED = 2;
  FEED_TYPE_TRENDING = 3;
  FEED_TYPE_CREATOR = 4;
}

message Post {
  string id = 1;
  string creator_id = 2;
  string content = 3;
  repeated MediaAttachment media = 4;
  int32 like_count = 5;
  int32 comment_count = 6;
  bool liked_by_me = 7;
  dexchats.common.v1.Timestamp created_at = 8;
}

message MediaAttachment {
  string url = 1;
  string type = 2;
  int32 width = 3;
  int32 height = 4;
}

message GetFeedRequest {
  string identity_id = 1;
  FeedType feed_type = 2;
  dexchats.common.v1.Pagination pagination = 3;
}

message GetFeedResponse {
  repeated Post posts = 1;
  int32 total = 2;
}

message CreatePostRequest {
  string creator_id = 1;
  string content = 2;
  repeated MediaAttachment media = 3;
}

message CreatePostResponse {
  Post post = 1;
}

message LikePostRequest {
  string post_id = 1;
  string identity_id = 2;
}

message LikePostResponse {
  int32 like_count = 1;
  bool liked = 2;
}

message GetTrendingRequest {
  dexchats.common.v1.Pagination pagination = 1;
}

message GetTrendingResponse {
  repeated Post posts = 1;
  int32 total = 2;
}
