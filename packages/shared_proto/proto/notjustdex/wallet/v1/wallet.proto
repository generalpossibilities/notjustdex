syntax = "proto3";

package notjustdex.wallet.v1;

option go_package = "github.com/notjustdex/wallet/v1;walletv1";

service WalletService {
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc GetTransactionHistory(GetTransactionHistoryRequest) returns (GetTransactionHistoryResponse);
  rpc Transfer(TransferRequest) returns (TransferResponse);
  rpc ExportWallet(ExportWalletRequest) returns (ExportWalletResponse);
  rpc InitiateRecovery(InitiateRecoveryRequest) returns (InitiateRecoveryResponse);
  rpc CompleteRecovery(CompleteRecoveryRequest) returns (CompleteRecoveryResponse);
}

message Balance {
  string token = 1;
  string amount = 2;
  int32 decimals = 3;
}

message GetBalanceRequest {
  string identity_id = 1;
}

message GetBalanceResponse {
  repeated Balance balances = 1;
}

message GetTransactionHistoryRequest {
  string identity_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message Transaction {
  string hash = 1;
  string from = 2;
  string to = 3;
  string amount = 4;
  string token = 5;
  int64 timestamp = 6;
  string status = 7;
}

message GetTransactionHistoryResponse {
  repeated Transaction transactions = 1;
  int32 total = 2;
}

message TransferRequest {
  string identity_id = 1;
  string to_address = 2;
  string amount = 3;
  string token = 4;
}

message TransferResponse {
  string transaction_hash = 1;
  string status = 2;
}

message ExportWalletRequest {
  string identity_id = 1;
  string password = 2;
}

message ExportWalletResponse {
  string mnemonic = 1;
  string private_key = 2;
}

message InitiateRecoveryRequest {
  string identity_id = 1;
}

message InitiateRecoveryResponse {
  string recovery_id = 1;
  int64 expires_at = 2;
}

message CompleteRecoveryRequest {
  string recovery_id = 1;
  string confirmation_code = 2;
}

message CompleteRecoveryResponse {
  bool success = 1;
}
